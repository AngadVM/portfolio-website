<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{{ .Title }} — Angad Muthyala</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --bg: #ffffff;
                --text-primary: #000000;
                --text-body: #171717;
                --text-muted: #737373;
                --text-faint: #a3a3a3;
                --border: #e5e5e5;
                --accent: #0066ff;
                --accent-hover: #0052cc;
                --nav-h: 60px;
            }

            *,
            *::before,
            *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html {
                scroll-behavior: smooth;
            }

            body {
                font-family:
                    "Manrope",
                    -apple-system,
                    BlinkMacSystemFont,
                    sans-serif;
                background: var(--bg);
                color: var(--text-body);
                line-height: 1.6;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                -webkit-font-smoothing: antialiased;
            }

            /* ─── NAV ─── */
            .nav {
                position: sticky;
                top: 0;
                z-index: 100;
                background: rgba(255, 255, 255, 0.9);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                border-bottom: 1px solid var(--border);
            }

            .nav-inner {
                max-width: 1200px;
                margin: 0 auto;
                padding: 0 2rem;
                height: var(--nav-h);
                display: flex;
                align-items: center;
                justify-content: space-between;
            }

            .nav-logo {
                font-size: 1rem;
                font-weight: 700;
                color: var(--text-primary);
                text-decoration: none;
                letter-spacing: -0.02em;
            }

            .nav-logo:hover {
                color: var(--accent);
            }

            .nav-links {
                display: flex;
                gap: 0;
                list-style: none;
            }

            .nav-links a {
                font-family: "JetBrains Mono", monospace;
                font-size: 0.6875rem;
                font-weight: 500;
                text-transform: uppercase;
                letter-spacing: 0.1em;
                color: var(--text-muted);
                text-decoration: none;
                padding: 0 1rem;
                height: var(--nav-h);
                display: flex;
                align-items: center;
                border-left: 1px solid var(--border);
                transition:
                    color 0.2s ease,
                    background 0.2s ease;
            }

            .nav-links li:last-child a {
                border-right: 1px solid var(--border);
            }

            .nav-links a:hover {
                color: var(--accent);
                background: #f5f5f5;
            }

            .nav-links a.active {
                color: var(--accent);
            }

            /* Hamburger */
            .hamburger {
                display: none;
                flex-direction: column;
                gap: 4px;
                cursor: pointer;
            }

            .hamburger span {
                width: 18px;
                height: 2px;
                background: var(--text-body);
                transition: all 0.3s ease;
                border-radius: 1px;
            }

            /* Mobile menu */
            .mobile-menu {
                display: none;
                position: fixed;
                top: var(--nav-h);
                left: 0;
                right: 0;
                background: rgba(255, 255, 255, 0.98);
                backdrop-filter: blur(12px);
                border-bottom: 1px solid var(--border);
                z-index: 99;
            }

            .mobile-menu.open {
                display: block;
            }

            .mobile-menu a {
                display: block;
                padding: 1rem 2rem;
                font-family: "JetBrains Mono", monospace;
                font-size: 0.75rem;
                text-transform: uppercase;
                letter-spacing: 0.1em;
                color: var(--text-muted);
                text-decoration: none;
                border-bottom: 1px solid var(--border);
                transition: color 0.2s ease;
            }

            .mobile-menu a:hover {
                color: var(--accent);
            }

            /* ─── LAYOUT ─── */
            .container {
                flex: 1;
                max-width: 720px;
                margin: 0 auto;
                padding: 4rem 2rem 6rem;
                width: 100%;
            }

            /* ─── TYPOGRAPHY ─── */
            h1 {
                font-size: 2.5rem;
                font-weight: 700;
                color: var(--text-primary);
                letter-spacing: -0.03em;
                line-height: 1.1;
                margin-bottom: 2rem;
                padding-bottom: 2rem;
                border-bottom: 1px solid var(--border);
            }

            h2 {
                font-size: 1.5rem;
                font-weight: 600;
                color: var(--text-primary);
                letter-spacing: -0.02em;
                margin: 3rem 0 1rem;
            }

            h3 {
                font-size: 1.125rem;
                font-weight: 600;
                color: var(--text-primary);
                margin: 2rem 0 0.75rem;
            }

            h4 {
                font-family: "JetBrains Mono", monospace;
                font-size: 0.6875rem;
                font-weight: 500;
                color: var(--text-muted);
                text-transform: uppercase;
                letter-spacing: 0.1em;
                margin: 1.5rem 0 0.5rem;
            }

            p {
                font-size: 1rem;
                font-weight: 400;
                color: var(--text-body);
                line-height: 1.7;
                margin-bottom: 1.25rem;
            }

            p strong {
                font-weight: 600;
                color: var(--text-primary);
            }

            p em {
                font-style: italic;
                color: var(--text-muted);
            }

            ul,
            ol {
                margin: 1rem 0;
                padding-left: 1.5rem;
            }

            li {
                font-size: 1rem;
                color: var(--text-body);
                line-height: 1.7;
                margin-bottom: 0.5rem;
            }

            li strong {
                font-weight: 600;
                color: var(--text-primary);
            }

            a {
                color: var(--accent);
                text-decoration: none;
                border-bottom: 1px solid transparent;
                transition: border-color 0.2s ease;
            }

            a:hover {
                border-bottom-color: var(--accent);
            }

            strong {
                font-weight: 600;
                color: var(--text-primary);
            }

            hr {
                border: none;
                border-top: 1px solid var(--border);
                margin: 2.5rem 0;
            }

            blockquote {
                border-left: 3px solid var(--accent);
                padding-left: 1.25rem;
                margin: 1.5rem 0;
                color: var(--text-muted);
            }

            blockquote p {
                font-style: italic;
                margin: 0;
            }

            code {
                font-family: "JetBrains Mono", "Courier New", monospace;
                font-size: 0.875em;
                background: #f5f5f5;
                padding: 0.2em 0.4em;
                border-radius: 3px;
                color: var(--text-primary);
            }

            /* ─── FOOTER ─── */
            footer {
                border-top: 1px solid var(--border);
                padding: 2rem 0;
            }

            .footer-inner {
                max-width: 720px;
                margin: 0 auto;
                padding: 0 2rem;
                display: flex;
                justify-content: space-between;
                align-items: center;
                flex-wrap: wrap;
                gap: 1rem;
            }

            .footer-links {
                display: flex;
                gap: 2rem;
                list-style: none;
            }

            .footer-links a {
                font-size: 0.875rem;
                font-weight: 500;
                color: var(--text-muted);
                text-decoration: none;
                border-bottom: none;
                transition: color 0.2s ease;
            }

            .footer-links a:hover {
                color: var(--accent);
                border-bottom: none;
            }

            .footer-copy {
                font-family: "JetBrains Mono", monospace;
                font-size: 0.75rem;
                color: var(--text-faint);
            }

            /* ─── RESPONSIVE ─── */
            @media (max-width: 768px) {
                .nav-inner {
                    padding: 0 1.5rem;
                }
                .nav-links {
                    display: none;
                }
                .hamburger {
                    display: flex;
                }
                .container {
                    padding: 3rem 1.5rem 4rem;
                }

                h1 {
                    font-size: 2rem;
                }
                h2 {
                    font-size: 1.25rem;
                }
                h3 {
                    font-size: 1.0625rem;
                }

                .footer-inner {
                    flex-direction: column;
                    align-items: flex-start;
                }
            }

            @media (max-width: 480px) {
                .nav-inner {
                    padding: 0 1.25rem;
                }
                .container {
                    padding: 2.5rem 1.25rem 3rem;
                }
                h1 {
                    font-size: 1.75rem;
                }
            }
        </style>
    </head>
    <body>
        <!-- NAV -->
        <nav class="nav">
            <div class="nav-inner">
                <a href="/" class="nav-logo">Angad Muthyala</a>
                <ul class="nav-links">
                    <li><a href="/">Home</a></li>
                    <li><a href="/about">About</a></li>
                    <li><a href="/projects">Projects</a></li>
                    <li><a href="/community">Community</a></li>
                    <li><a href="/contact">Contact</a></li>
                </ul>
                <div class="hamburger" id="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </nav>

        <!-- MOBILE MENU -->
        <div class="mobile-menu" id="mobileMenu">
            <a href="/">Home</a>
            <a href="/about">About</a>
            <a href="/projects">Projects</a>
            <a href="/community">Community</a>
            <a href="/contact">Contact</a>
        </div>

        <!-- MAIN -->
        <main class="container">{{ .Content }}</main>

        <!-- FOOTER -->
        <footer>
            <div class="footer-inner">
                <ul class="footer-links">
                    <li>
                        <a
                            href="{{ .Site.Params.github }}"
                            target="_blank"
                            rel="noopener"
                            >GitHub</a
                        >
                    </li>
                    <li>
                        <a
                            href="{{ .Site.Params.linkedin }}"
                            target="_blank"
                            rel="noopener"
                            >LinkedIn</a
                        >
                    </li>
                    <li><a href="mailto:{{ .Site.Params.email }}">Email</a></li>
                </ul>
                <span class="footer-copy">© {{ now.Year }}</span>
            </div>
        </footer>

        <script>
            // Hamburger
            const hamburger = document.getElementById("hamburger");
            const mobileMenu = document.getElementById("mobileMenu");

            hamburger.addEventListener("click", () => {
                const isOpen = mobileMenu.classList.toggle("open");
                const [s1, s2, s3] = hamburger.querySelectorAll("span");
                s1.style.transform = isOpen
                    ? "translateY(6px) rotate(45deg)"
                    : "";
                s2.style.opacity = isOpen ? "0" : "";
                s3.style.transform = isOpen
                    ? "translateY(-6px) rotate(-45deg)"
                    : "";
            });

            document.addEventListener("click", (e) => {
                if (
                    !hamburger.contains(e.target) &&
                    !mobileMenu.contains(e.target)
                ) {
                    mobileMenu.classList.remove("open");
                    hamburger.querySelectorAll("span").forEach((s) => {
                        s.style.transform = "";
                        s.style.opacity = "";
                    });
                }
            });

            mobileMenu.querySelectorAll("a").forEach((a) => {
                a.addEventListener("click", () => {
                    mobileMenu.classList.remove("open");
                    hamburger.querySelectorAll("span").forEach((s) => {
                        s.style.transform = "";
                        s.style.opacity = "";
                    });
                });
            });

            // Active link
            const path = window.location.pathname.replace(/\/$/, "") || "/";
            document.querySelectorAll(".nav-links a").forEach((link) => {
                if (link.getAttribute("href").replace(/\/$/, "") === path)
                    link.classList.add("active");
            });
        </script>
    </body>
</html>
